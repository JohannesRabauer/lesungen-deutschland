name: Update Data

on:
  schedule:
    - cron: '0 3 * * 0' # Run at 3 AM UTC every Sunday
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Puppeteer system dependencies
        run: npx puppeteer browsers install chrome

      - name: Run Scraper
        run: node scripts/scrape.js

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-diagnostics
          path: scripts/diagnostics.json
          retention-days: 30

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add public/data/events.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update events data"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected, retrying ($i)..."
            git pull --rebase origin main
          done
          echo "Push failed after retries."
          exit 1
